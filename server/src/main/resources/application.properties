# Spring datasource
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/feasymenu}
spring.datasource.username=${DATASOURCE_USER:postgres}
spring.datasource.password=${DATASOURCE_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server
server.port=8080
spring.threads.virtual.enabled=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.feasymenu.server=DEBUG
# Enable Spring Security debug logging to diagnose unexpected 403 responses during troubleshooting
logging.level.org.springframework.security=DEBUG

# File uploads directory (inside server/)
app.upload-dir=./uploads

# If payments are disabled, show this contact email to users who want to pay manually
payments.contactEmail=${PAYMENTS_CONTACT_EMAIL:support@feasymenu.com}

# Client URL (CORS)
client.url=${CLIENT_URL:http://localhost:3000}
client.allowed-origin-pattern=http://localhost:3000,http://127.0.0.1:3000,http://*.localhost:3000,http://*.localhost,https://feasymenu.com,https://*.feasymenu.com

# Time & JSON
# App-default timezone for background tasks (Global)
app.time-zone=${APP_TIME_ZONE:UTC}
# Ensure DB/JDBC operates in UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Serialize JSON timestamps in UTC (Z)
spring.jackson.time-zone=UTC

# Pricing (configurable)
pricing.currency=${PRICING_CURRENCY:USD}
pricing.standardMonthly=${PRICING_STANDARD_MONTHLY:14.99}
pricing.standardYearly=${PRICING_STANDARD_YEARLY:149.99}
pricing.proMonthly=${PRICING_PRO_MONTHLY:29.99}
pricing.proYearly=${PRICING_PRO_YEARLY:299.99}

